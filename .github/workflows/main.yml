name: Merge JS Files

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  merge_js:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Merge JS files
        run: |
          mkdir -p dist
          echo '/* Merged JS file - auto generated by GitHub Actions */' > dist/bundle.js
          for file in $(find src -name "*.js"); do
            echo "Adding $file"
            cat $file >> dist/bundle.js
            echo "\n\n" >> dist/bundle.js
          done

      - name: Commit and push merged JS file
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add dist/bundle.js
          git commit -m "Add merged JavaScript bundle"
          git push https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main

