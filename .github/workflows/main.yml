name: Install, Merge, and Commit JS Files

on:
  workflow_dispatch:
    inputs:
      target_file:
        description: 'Output file to save the merged JavaScript'
        required: true
        default: 'dist/_worker.js'

jobs:
  process_js:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Generate temporary package.json and install dependencies
        run: |
          for dir in $(find src -type d); do
            js_files=$(find "$dir" -maxdepth 1 -name "*.js")
            if [ ! -z "$js_files" ]; then
              echo "Processing directory: $dir"
              cd "$dir"

              # Generate a temporary package.json
              echo '{}' > package.json

              # Detect and install dependencies for each JavaScript file
              for js_file in $js_files; do
                dependencies=$(grep -oP "(?<=require\(['\"])[^'\"]+(?=['\"]\))" "$js_file" | sort | uniq)
                for dep in $dependencies; do
                  echo "Adding dependency: $dep"
                  npm install "$dep"
                done
              done

              # Cleanup temporary package.json and node_modules if desired
              rm package.json
              cd -
            fi
          done

      - name: Merge all JavaScript files
        run: |
          mkdir -p dist
          echo '/* Merged JS file - auto generated by GitHub Actions */' > ${{ github.event.inputs.target_file }}
          
          for file in $(find src -name "*.js"); do
            if [[ "$file" != *"cloudflare_worker.js" ]]; then
              echo "\n/* File: $file */" >> ${{ github.event.inputs.target_file }}
              cat $file >> ${{ github.event.inputs.target_file }}
            else
              echo "Skipping Cloudflare Worker library: $file"
            fi
          done

      - name: Replace \\n/ with /
        run: |
          sed -i 's/\\n\\//\\//g' ${{ github.event.inputs.target_file }}

      - name: Commit merged file
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add ${{ github.event.inputs.target_file }}
          git commit -m "Merge JS files into ${{ github.event.inputs.target_file }}" || echo "No changes to commit"

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}
