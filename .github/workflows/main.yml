name: Build and Merge JavaScript

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 检出代码
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    # 安装依赖
    - name: Install dependencies
      run: npm install
      working-directory: ./bpb/src # 如果 package.json 在子目录，设置工作目录

    # 使用 Rollup 构建
    - name: Build with Rollup
      run: npx rollup src/worker.js --file dist/worker.js --format iife

    # 上传生成的文件
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: merged-js
        path: dist/worker.js
