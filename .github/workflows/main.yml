name: Build and Merge JavaScript

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 检出代码库
    - name: Checkout repository
      uses: actions/checkout@v3

    # 设置 Node.js 环境
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    - name: npm init
      run: npm init
      
    # 安装依赖
    - name: Install dependencies
      run: npm install

    # 使用 Rollup 合并 JS 文件
    - name: Build with Rollup
      run: npx rollup src/worker.js --file dist/worker.js --format iife

    # 输出生成文件内容（可选）
    - name: Display output
      run: cat dist/worker.js

    # 上传到 GitHub Artifact（可选）
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: merged-js
        path: dist/worker.js
