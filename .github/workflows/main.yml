name: Obfuscate and Commit

on:
  workflow_dispatch:
    inputs:
      source_file:
        description: 'Source JavaScript file to obfuscate'
        required: true
        default: 'src/worker.js'

jobs:
  obfuscate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Merge all JavaScript files
        run: |
          mkdir -p dist
          echo '/* Merged JS file - auto generated by GitHub Actions */' > dist/bundle.js
          for file in $(find src -name "*.js"); do
            echo "Adding $file"
            cat $file >> dist/bundle.js
            echo "\n\n" >> dist/bundle.js
          done

      - name: Install JavaScript obfuscator
        run: npm install -g javascript-obfuscator

      - name: Obfuscate merged JS
        run: |
          javascript-obfuscator dist/bundle.js --output dist/_worker.js \
          --compact true \
          --control-flow-flattening true \
          --control-flow-flattening-threshold 1 \
          --dead-code-injection true \
          --dead-code-injection-threshold 1 \
          --identifier-names-generator hexadecimal \
          --rename-globals true \
          --string-array true \
          --string-array-encoding 'rc4' \
          --string-array-threshold 1 \
          --transform-object-keys true \
          --unicode-escape-sequence true

      - name: Commit obfuscated file
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add dist/_worker.js
          git commit -m "Obfuscate _worker.js" || echo "No changes to commit"

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}
