name: Merge and Commit JS Files

on:
  workflow_dispatch:
    inputs:
      target_file:
        description: 'Output file to save the merged JavaScript'
        required: true
        default: 'dist/_worker.js'

jobs:
  merge_js:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Merge all JavaScript files
        run: |
          mkdir -p dist
          echo '/* Merged JS file - auto generated by GitHub Actions */' > ${{ github.event.inputs.target_file }}
          for file in $(find src -name "*.js"); do
            echo "Adding $file"
            cat $file >> ${{ github.event.inputs.target_file }}
            echo "\n\n" >> ${{ github.event.inputs.target_file }}
          done

      - name: Commit merged file
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add ${{ github.event.inputs.target_file }}
          git commit -m "Merge JS files into ${{ github.event.inputs.target_file }}" || echo "No changes to commit"

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}
